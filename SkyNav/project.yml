name: SkyNav
options:
  bundleIdPrefix: com.skynav
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  swift: "5.9"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1

targets:
  SkyNav:
    type: application
    platform: iOS
    bundleId: com.skynav.app
    sources:
      - SkyNav
      - Shared         # FlightActivityAttributes shared with widget extension
    settings:
      base:
        INFOPLIST_FILE: SkyNav/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.skynav.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
    entitlements:
      com.apple.security.application-groups:
        - group.com.skynav.shared
      aps-environment: development
    dependencies:
      - target: SkyNavWidgets
        embed: true
      - sdk: StoreKit.framework
      - sdk: MapKit.framework
      - sdk: ActivityKit.framework
        weak: true
      - sdk: UserNotifications.framework
      - sdk: AVFoundation.framework

  SkyNavWidgets:
    type: app-extension
    platform: iOS
    bundleId: com.skynav.app.widgets
    sources:
      - SkyNavWidgets
      - Shared         # FlightActivityAttributes shared with main app
    settings:
      base:
        INFOPLIST_FILE: SkyNavWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.skynav.app.widgets
        APPLICATION_EXTENSION_API_ONLY: YES
    entitlements:
      com.apple.security.application-groups:
        - group.com.skynav.shared
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: ActivityKit.framework
        weak: true
